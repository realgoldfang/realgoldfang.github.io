# .github/workflows/deploy-site.yml
# Builds the Astro site and deploys to GitHub Pages.
# Also copies the apt repo tree (managed by build-deb.yml) into the Pages artifact.

name: Deploy Site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Ensure apt dir exists
        run: mkdir -p site/dist/apt

      - name: Copy apt repo tree into Pages artifact
        run: |
          if [ -d "apt-repo/public" ] && [ "$(ls -A apt-repo/public 2>/dev/null)" ]; then
            cp -r apt-repo/public/* site/dist/apt/
            echo "apt repo tree copied to site/dist/apt/"
          else
            echo "no apt-repo/public/ found, skipping apt repo in this deploy"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
