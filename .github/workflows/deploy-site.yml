# .github/workflows/deploy-site.yml
# Builds the Astro site and deploys to GitHub Pages.
# Clones the apt-repo and includes its public/ in the Pages artifact.

name: Deploy Site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Checkout apt-repo
        uses: actions/checkout@v4
        with:
          repository: realgoldfang/apt-repo
          path: apt-repo

      - name: Merge apt-repo into Pages dist
        run: |
          mkdir -p site/dist/apt
          if [ -d "apt-repo/public" ] && [ "$(ls -A apt-repo/public 2>/dev/null)" ]; then
            cp -r apt-repo/public/. site/dist/apt/
            echo "apt repo merged into site/dist/apt/"
          else
            echo "no apt-repo/public/, skipping"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
