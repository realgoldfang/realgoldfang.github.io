# .github/workflows/build-and-publish-deb.yml
# Builds a .deb package, signs it into the aptly repo, and publishes.
# Triggered on tag push from source repos.

name: Build & Publish Deb

on:
  push:
    tags:
      - 'v*'

  # Manual trigger for ad-hoc publishes
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name (e.g. mcp-sysd)'
        required: true
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
      architectures:
        description: 'Target architectures (comma-separated: amd64,arm64)'
        required: false
        default: 'amd64'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set package metadata
        id: meta
        run: |
          PKG_NAME="${{ github.event.inputs.package_name || github.event.repository.name }}"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "package_name=${PKG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        if: hashFiles('go.mod') != ''
        with:
          go-version: '1.22'

      - name: Build binary (amd64)
        if: matrix.arch == 'amd64'
        run: |
          if [ -f go.mod ]; then
            GOOS=linux GOARCH=amd64 go build -o bin/${{ steps.meta.outputs.package_name }} ./cmd/${{ steps.meta.outputs.package_name }}
          fi

      - name: Build binary (arm64)
        if: matrix.arch == 'arm64'
        run: |
          if [ -f go.mod ]; then
            GOOS=linux GOARCH=arm64 go build -o bin/${{ steps.meta.outputs.package_name }} ./cmd/${{ steps.meta.outputs.package_name }}
          fi

      - name: Build .deb package
        run: |
          PKG="${{ steps.meta.outputs.package_name }}"
          VER="${{ steps.meta.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          DEB_DIR="build/${PKG}_${VER}_${ARCH}"

          mkdir -p "${DEB_DIR}/DEBIAN"
          mkdir -p "${DEB_DIR}/usr/local/bin"

          cp "bin/${PKG}" "${DEB_DIR}/usr/local/bin/${PKG}"
          chmod 755 "${DEB_DIR}/usr/local/bin/${PKG}"

          cat > "${DEB_DIR}/DEBIAN/control" << EOF
          Package: ${PKG}
          Version: ${VER}
          Architecture: ${ARCH}
          Maintainer: goldfang <apt@realgoldfang.dev>
          Description: ${PKG}
          EOF

          # Remove leading spaces
          sed -i 's/^          //' "${DEB_DIR}/DEBIAN/control"

          dpkg-deb --build "${DEB_DIR}" "build/${PKG}_${VER}_${ARCH}.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_name }}-${{ matrix.arch }}
          path: build/*.deb

  publish-to-repo:
    needs: build-deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs/

      - name: Add packages to aptly repo
        env:
          APTLY_SSH_KEY: ${{ secrets.APTLY_SSH_KEY }}
          APTLY_HOST: ${{ secrets.APTLY_HOST }}
          APTLY_USER: ${{ secrets.APTLY_USER }}
        run: |
          # Copy SSH key
          mkdir -p ~/.ssh
          echo "${APTLY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Discover codename from the runner's OS
          CODENAME=$(lsb_release -cs)
          echo "Target codename: ${CODENAME}"

          # Upload and add each deb
          find debs/ -name '*.deb' | while read deb; do
            echo "==> uploading $(basename ${deb})"
            scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${deb}" "${APTLY_USER}@${APTLY_HOST}:/tmp/"

            echo "==> adding to repo"
            ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${APTLY_USER}@${APTLY_HOST}" \
              "cd /opt/goldfang-apt-repo && ./scripts/add-package.sh ${CODENAME} /tmp/$(basename ${deb})"
          done

      - name: Publish updated repo
        env:
          APTLY_SSH_KEY: ${{ secrets.APTLY_SSH_KEY }}
          APTLY_HOST: ${{ secrets.APTLY_HOST }}
          APTLY_USER: ${{ secrets.APTLY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            "${APTLY_USER}@${APTLY_HOST}" \
            "cd /opt/goldfang-apt-repo && ./scripts/publish-repo.sh"
