# .github/workflows/build-deb.yml
# Builds a .deb package from a source repo, signs it with aptly, and
# pushes the updated repo tree to realgoldfang/apt-repo.
# Then triggers a site deploy so the Pages site picks up the new packages.
#
# Triggered by:
#   - repository_dispatch from source repos on release
#   - Manual workflow_dispatch
#
# Requires secret: APT_PAT (PAT with push access to realgoldfang/apt-repo)

name: Build Deb Package

on:
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name'
        required: true
        type: choice
        options:
          - backup-util
          - howler
          - luna-rs
          - lupine
          - mcp-sysd
          - russtly
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
      repo:
        description: 'Source repo (owner/repo)'
        required: true

permissions:
  contents: write

concurrency:
  group: build-deb
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve inputs
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "package=${{ github.event.client_payload.package }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
            echo "source_repo=${{ github.event.client_payload.repo }}" >> "$GITHUB_OUTPUT"
          else
            echo "package=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "source_repo=${{ inputs.repo }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          path: this-repo

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve.outputs.source_repo }}
          ref: ${{ steps.resolve.outputs.tag }}
          path: source

      - name: Checkout apt-repo
        uses: actions/checkout@v4
        with:
          repository: realgoldfang/apt-repo
          token: ${{ secrets.APT_PAT }}
          path: apt-repo

      - name: Set package version
        id: version
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Detect build type
        id: detect
        working-directory: source
        run: |
          if [ -f "build-deb.sh" ]; then
            echo "build_type=script" >> "$GITHUB_OUTPUT"
          elif [ -f "Cargo.toml" ]; then
            echo "build_type=cargo" >> "$GITHUB_OUTPUT"
            # Try root-level [[bin]] first
            BINS=$(grep -A1 '^\[\[bin\]\]' Cargo.toml 2>/dev/null | grep 'name' | sed 's/.*name.*=.*"\(.*\)"/\1/' | tr '\n' ' ')
            # If empty, try workspace: find [[bin]] in each member
            if [ -z "${BINS}" ]; then
              if grep -q '^\[workspace\]' Cargo.toml 2>/dev/null; then
                echo "==> detected workspace project"
                for member in $(grep -A100 '^\[workspace\]' Cargo.toml | grep -A50 'members' | grep '"' | sed 's/.*"\(.*\)".*/\1/'); do
                  if [ -f "${member}/Cargo.toml" ]; then
                    MEMBER_BINS=$(grep -A1 '^\[\[bin\]\]' "${member}/Cargo.toml" 2>/dev/null | grep 'name' | sed 's/.*name.*=.*"\(.*\)"/\1/' | tr '\n' ' ')
                    BINS="${BINS}${MEMBER_BINS} "
                  fi
                done
              fi
            fi
            BINS=$(echo "${BINS}" | xargs)
            echo "bins=${BINS}" >> "$GITHUB_OUTPUT"
            echo "==> detected bins: ${BINS}"
          elif [ -f "Makefile" ] && [ -f "*.c" ] 2>/dev/null; then
            echo "build_type=make" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
            echo "build_type=electron" >> "$GITHUB_OUTPUT"
          else
            echo "error: unknown project type in $(pwd)"
            exit 1
          fi

      # -- Rust (cargo) --
      - name: Set up Rust
        if: steps.detect.outputs.build_type == 'cargo'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system deps (cargo)
        if: steps.detect.outputs.build_type == 'cargo'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev pkg-config

      - name: Build binaries (cargo)
        if: steps.detect.outputs.build_type == 'cargo'
        working-directory: source
        run: |
          for binary in ${{ steps.detect.outputs.bins }}; do
            echo "==> building ${binary}"
            cargo build --release --bin "${binary}"
          done

      - name: Build .deb packages (cargo)
        if: steps.detect.outputs.build_type == 'cargo'
        working-directory: source
        run: |
          VER="${{ steps.version.outputs.version }}"
          ARCH="$(dpkg --print-architecture)"
          PKG="${{ steps.resolve.outputs.package }}"

          for binary in ${{ steps.detect.outputs.bins }}; do
            echo "==> packaging ${binary}"
            DEB_DIR="/tmp/debs/${binary}_${VER}_${ARCH}"
            mkdir -p "${DEB_DIR}/DEBIAN"
            mkdir -p "${DEB_DIR}/usr/local/bin"

            cp "target/release/${binary}" "${DEB_DIR}/usr/local/bin/${binary}"
            chmod 755 "${DEB_DIR}/usr/local/bin/${binary}"

            cat > "${DEB_DIR}/DEBIAN/control" << CTRL
          Package: ${binary}
          Version: ${VER}
          Architecture: ${ARCH}
          Maintainer: goldfang <apt@realgoldfang.dev>
          Description: ${binary} from ${PKG}
          CTRL
            sed -i '/^$/d' "${DEB_DIR}/DEBIAN/control"
            sed -i 's/^ *//' "${DEB_DIR}/DEBIAN/control"

            dpkg-deb --build "${DEB_DIR}" "/tmp/debs/${binary}_${VER}_${ARCH}.deb"
          done

      # -- C (make) --
      - name: Build binary (make)
        if: steps.detect.outputs.build_type == 'make'
        working-directory: source
        run: |
          make clean 2>/dev/null || true
          make -j"$(nproc)"

      - name: Build .deb (make)
        if: steps.detect.outputs.build_type == 'make'
        working-directory: source
        run: |
          VER="${{ steps.version.outputs.version }}"
          ARCH="$(dpkg --print-architecture)"
          PKG="${{ steps.resolve.outputs.package }}"

          DEB_DIR="/tmp/debs/${PKG}_${VER}_${ARCH}"
          mkdir -p "${DEB_DIR}/DEBIAN"
          mkdir -p "${DEB_DIR}/usr/local/bin"

          BIN=$(find . -maxdepth 1 -type f -executable ! -name '*.o' ! -name '*.sh' | head -1)
          if [ -z "${BIN}" ]; then
            BIN="${PKG}"
          fi
          cp "${BIN}" "${DEB_DIR}/usr/local/bin/"
          chmod 755 "${DEB_DIR}/usr/local/bin/$(basename ${BIN})"

          cat > "${DEB_DIR}/DEBIAN/control" << CTRL
          Package: ${PKG}
          Version: ${VER}
          Architecture: ${ARCH}
          Maintainer: goldfang <apt@realgoldfang.dev>
          Description: ${PKG}
          CTRL
          sed -i '/^$/d' "${DEB_DIR}/DEBIAN/control"
          sed -i 's/^ *//' "${DEB_DIR}/DEBIAN/control"

          dpkg-deb --build "${DEB_DIR}" "/tmp/debs/${PKG}_${VER}_${ARCH}.deb"

      # -- Python (build-deb.sh) --
      - name: Set up Python
        if: steps.detect.outputs.build_type == 'script'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build .deb (build-deb.sh)
        if: steps.detect.outputs.build_type == 'script'
        working-directory: source
        run: |
          chmod +x build-deb.sh
          bash build-deb.sh
          mkdir -p /tmp/debs
          find . -name '*.deb' -exec cp {} /tmp/debs/ \;

      # -- Electron --
      - name: Set up Node.js
        if: steps.detect.outputs.build_type == 'electron'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build .deb (electron)
        if: steps.detect.outputs.build_type == 'electron'
        working-directory: source
        run: |
          npm ci
          npx electron-builder --linux deb
          mkdir -p /tmp/debs
          find . -name '*.deb' -exec cp {} /tmp/debs/ \;

      # -- Shared: GPG + aptly --
      - name: Import GPG key
        env:
          APTLY_GPG_KEY: ${{ secrets.APTLY_GPG_KEY }}
        run: |
          echo "${APTLY_GPG_KEY}" | base64 -d | gpg --batch --import

      - name: Install aptly
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aptly

      - name: Restore existing packages from apt-repo
        working-directory: apt-repo
        run: |
          mkdir -p /tmp/existing-debs
          for CODENAME in noble plucky; do
            for ARCH in amd64 arm64; do
              PKGS="public/dists/${CODENAME}/main/binary-${ARCH}/Packages.gz"
              if [ -f "${PKGS}" ]; then
                echo "==> restoring existing debs for ${CODENAME}/${ARCH}"
                zcat "${PKGS}" | grep '^Filename:' | sed 's|^Filename: pool/|pool/|' | while read -r path; do
                  FILENAME=$(basename "${path}")
                  if [ -f "public/${path}" ]; then
                    cp "public/${path}" "/tmp/existing-debs/${FILENAME}" 2>/dev/null || true
                  fi
                done
              fi
            done
          done
          echo "==> restored $(ls /tmp/existing-debs/*.deb 2>/dev/null | wc -l) existing debs"

      - name: Initialize aptly and publish
        working-directory: apt-repo
        run: |
          export APTLY_ROOT="/tmp/aptly-root"
          mkdir -p "${APTLY_ROOT}"

          cat > /tmp/aptly.conf << APTLYCONF
          {
            "rootDir": "${APTLY_ROOT}",
            "downloadConcurrency": 4,
            "downloadPath": "${APTLY_ROOT}/downloads",
            "databasePath": "${APTLY_ROOT}/db",
            "publicPath": "",
            "serveInAPoint": false
          }
          APTLYCONF
          sed -i '/^$/d' /tmp/aptly.conf
          sed -i 's/^ *//' /tmp/aptly.conf

          for CODENAME in noble plucky; do
            REPO_NAME="goldfang-${CODENAME}"
            aptly -config=/tmp/aptly.conf repo create \
              -distribution="${CODENAME}" \
              -component="main" \
              -architectures="amd64,arm64" \
              "${REPO_NAME}" 2>/dev/null || true
          done

          CODENAME=$(lsb_release -cs)
          echo "==> runner codename: ${CODENAME}"

          SUPPORTED_CODENAME="noble"
          if [ "${CODENAME}" = "plucky" ] || [ "${CODENAME}" = "noble" ]; then
            SUPPORTED_CODENAME="${CODENAME}"
          fi

          echo "==> adding restored existing debs"
          find /tmp/existing-debs -name '*.deb' 2>/dev/null | while read deb; do
            aptly -config=/tmp/aptly.conf repo add "goldfang-${SUPPORTED_CODENAME}" "${deb}" || true
          done

          echo "==> adding new debs"
          find /tmp/debs -name '*.deb' 2>/dev/null | while read deb; do
            echo "==> adding $(basename ${deb}) to ${SUPPORTED_CODENAME}"
            aptly -config=/tmp/aptly.conf repo add "goldfang-${SUPPORTED_CODENAME}" "${deb}" || true
          done

          KEY_NAME="goldfang-apt-repo"
          KEY_EMAIL="apt@realgoldfang.dev"

          for CODENAME in noble plucky; do
            REPO_NAME="goldfang-${CODENAME}"
            aptly -config=/tmp/aptly.conf repo show "${REPO_NAME}" 2>/dev/null || continue

            if aptly -config=/tmp/aptly.conf publish list -raw 2>/dev/null | grep -q "^${CODENAME} "; then
              echo "==> updating ${CODENAME}"
              aptly -config=/tmp/aptly.conf publish update \
                -batch \
                -gpg-key="${KEY_NAME} <${KEY_EMAIL}>" \
                -distribution="${CODENAME}" \
                -architectures="amd64,arm64" \
                "${CODENAME}" public || true
            else
              echo "==> publishing ${CODENAME}"
              aptly -config=/tmp/aptly.conf publish repo \
                -batch \
                -gpg-key="${KEY_NAME} <${KEY_EMAIL}>" \
                -distribution="${CODENAME}" \
                -component="main" \
                -architectures="amd64,arm64" \
                "${REPO_NAME}" public || true
            fi
          done

          echo "==> published tree:"
          find public/ -type f | head -30

      - name: Commit and push apt-repo
        working-directory: apt-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "no changes to commit" && exit 0
          git commit -m "apt: add ${{ steps.resolve.outputs.package }} ${{ steps.resolve.outputs.tag }}"
          git push

      - name: Export public key to site repo
        working-directory: this-repo
        run: |
          KEY_NAME="goldfang-apt-repo"
          KEY_EMAIL="apt@realgoldfang.dev"
          mkdir -p site/public/apt
          gpg --export --armor "${KEY_NAME} <${KEY_EMAIL}>" > site/public/apt/pubkey.gpg

      - name: Commit and push site repo (triggers deploy-site)
        working-directory: this-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/public/apt/pubkey.gpg
          git diff --cached --quiet && echo "no site changes" && exit 0
          git commit -m "chore: update apt signing key"
          git push
