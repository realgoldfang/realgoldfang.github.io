# /etc/nginx/sites-available/realgoldfang-site.conf
# Personal website — static files served from the Astro build output.
# This is the main portfolio/landing site.

server {
    listen 80;
    listen [::]:80;
    server_name realgoldfang.github.io;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name realgoldfang.github.io;

    # TLS (Let's Encrypt certbot)
    ssl_certificate /etc/letsencrypt/live/realgoldfang.github.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/realgoldfang.github.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    root /var/www/site;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # No dotfiles
    location ~ /\. {
        deny all;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
