# /etc/nginx/sites-available/realgoldfang-apt.conf
# APT repository — serves signed deb packages and metadata.
# This is a separate server block from the website for isolation.
# A broken aptly publish can't take down the portfolio site.

server {
    listen 80;
    listen [::]:80;
    server_name apt.realgoldfang.dev;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apt.realgoldfang.dev;

    # TLS (Let's Encrypt certbot)
    ssl_certificate /etc/letsencrypt/live/apt.realgoldfang.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apt.realgoldfang.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # APT repo root — this is where aptly publishes to
    root /var/www/apt;
    index index.html;

    # Serve the repo tree as-is
    location / {
        autoindex off;
        try_files $uri =404;
    }

    # GPG public key — always serve fresh, no caching
    location = /pubkey.gpg {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/pgp-keys";
    }

    # Disable directory listing
    location ~ /[^/]*\.(deb|deb$|gz|xz|gpg)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # No dotfiles
    location ~ /\. {
        deny all;
    }
}
